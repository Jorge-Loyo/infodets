name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          script: |
            cd ~/infodets
            git pull origin main

            # ── Backend ──────────────────────────────────────────
            cd ~/infodets/Backend
            source venv/bin/activate
            pip install -r requirements.txt -q
            alembic upgrade head
            sudo systemctl restart fastapi
            deactivate
            echo "Backend desplegado ✅"

            # ── Frontend ─────────────────────────────────────────
            cd ~/infodets
            docker build --no-cache -t infodets-frontend ./Frontend/infodets-web
            docker stop infodets-web 2>/dev/null || true
            docker rm infodets-web 2>/dev/null || true
            docker run -d \
              --name infodets-web \
              --restart unless-stopped \
              -p 3000:3000 \
              infodets-frontend
            echo "Frontend desplegado ✅"

            echo "Deploy completado ✅"
