name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/infodets
            git pull origin main

            # ── Backend ──────────────────────────────────────────
            cd ~/infodets/Backend
            source venv/bin/activate
            pip install -r requirements.txt -q
            sudo systemctl restart fastapi
            echo "Backend desplegado ✅"

            # ── Frontend ─────────────────────────────────────────
            cd ~/infodets/Frontend/infodets-web
            docker build -t infodets-frontend .
            docker stop infodets-frontend 2>/dev/null || true
            docker rm infodets-frontend 2>/dev/null || true
            docker run -d \
              --name infodets-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NEXT_PUBLIC_API_URL=http://32.192.124.14:8000/v1 \
              infodets-frontend
            echo "Frontend desplegado ✅"

            echo "Deploy completado ✅"
