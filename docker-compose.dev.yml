services:

  # ─── Back-End FastAPI (desarrollo con hot-reload) ───────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: infodets-backend-dev
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    volumes:
      - ./Backend:/app
    networks:
      - infodets-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Front-End Next.js (desarrollo con hot-reload) ──────────────
  frontend:
    image: node:20-alpine
    container_name: infodets-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - ./Frontend/infodets-web/.env.local
    volumes:
      - ./Frontend/infodets-web:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - infodets-network
    restart: unless-stopped
    command: sh -c "npm install && npm run dev"

networks:
  infodets-network:
    driver: bridge
