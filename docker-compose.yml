services:

  # ─── Back-End FastAPI ───────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: infodets-backend
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    volumes:
      - ./Backend:/app
    networks:
      - infodets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Front-End Next.js ──────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend/infodets-web
      dockerfile: Dockerfile
    container_name: infodets-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./Frontend/infodets-web/.env.local
    depends_on:
      - backend
    networks:
      - infodets-network
    restart: unless-stopped

networks:
  infodets-network:
    driver: bridge
